<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTS Reader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 400px;
      min-height: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: #f5f5f5;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #ddd;
    }
    
    .header h1 {
      font-size: 18px;
      color: #333;
    }
    
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    button.primary {
      background: #007bff;
      color: white;
    }
    
    button.primary:hover {
      background: #0056b3;
    }
    
    button.secondary {
      background: #6c757d;
      color: white;
    }
    
    button.secondary:hover {
      background: #545b62;
    }
    
    button.danger {
      background: #dc3545;
      color: white;
    }
    
    button.danger:hover {
      background: #c82333;
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .voice-select {
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      background: white;
    }
    
    .paragraph-list {
      max-height: 400px;
      overflow-y: auto;
      background: white;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    
    .paragraph-item {
      padding: 12px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 14px;
      line-height: 1.5;
      color: #333;
    }
    
    .paragraph-item:last-child {
      border-bottom: none;
    }
    
    .paragraph-item:hover {
      background: #f0f0f0;
    }
    
    .paragraph-item.active {
      background: #e3f2fd;
      border-left: 3px solid #007bff;
    }
    
    .paragraph-item.read {
      color: #666;
      background: #fafafa;
    }
    
    .status {
      text-align: center;
      padding: 8px;
      font-size: 13px;
      color: #666;
      margin-top: 12px;
    }
    
    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📖 TTS Reader</h1>
  </div>
  
  <select id="voiceSelect" class="voice-select">
    <option value="">Loading voices...</option>
  </select>
  
  <div class="controls">
    <button id="playBtn" class="primary">▶ Play</button>
    <button id="pauseBtn" class="secondary">⏸ Pause</button>
    <button id="stopBtn" class="danger">⏹ Stop</button>
  </div>
  
  <div class="controls">
    <button id="nextBtn" class="primary">Next ▶</button>
    <button id="prevBtn" class="secondary">◀ Prev</button>
  </div>
  
  <div id="paragraphList" class="paragraph-list">
    <div class="loading">Loading page content...</div>
  </div>
  
  <div id="status" class="status">Ready</div>
  
  <script src="popup.js"></script>
</body>
</html>
